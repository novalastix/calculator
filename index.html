<!DOCTYPE html>
<html lang="en" data-theme="light">
    <head>
        <title>Calculator</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <main id="main">
            <header>
                <div id="title">Calculator</div>
            </header>
            <div id="screen">
                5+5=10
            </div>
            <input type="text" autofocus id="textbar"></input>
            <div id="buttons">
                <table>
                    <tr>
                    <td><button type="button" onclick="insert(7)">7</button></td>
                    <td><button type="button" onclick="insert(7)">8</button></td>
                    <td><button type="button" onclick="insert(7)">9</button></td>
                    <td><button type="button" onclick="insert(7)">/</button></td>
                    </tr>
                    <tr>
                    <td><button type="button" onclick="insert(7)">4</button></td>
                    <td><button type="button" onclick="insert(7)">5</button></td>
                    <td><button type="button" onclick="insert(7)">6</button></td>
                    <td><button type="button" onclick="insert(7)">*</button></td>
                    </tr>
                    <tr>
                    <td><button type="button" onclick="insert(7)">1</button></td>
                    <td><button type="button" onclick="insert(7)">2</button></td>
                    <td><button type="button" onclick="insert(7)">3</button></td>
                    <td><button type="button" onclick="insert(7)">-</button></td>
                    </tr>
                    <tr>
                    <td><button type="button" onclick="insert(7)">0</button></td>
                    <td><button type="button" onclick="insert(7)">.</button></td>
                    <td><button type="button" onclick="insert(7)">=</button></td>
                    <td><button type="button" onclick="insert(7)">+</button></td>
                    </tr>
                </table>
            </div>
        </main>  
    </body>
    <script src="main.js"></script>
</html>
